<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}后台管理{% endblock %} — 个人藏书</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="{{ url_for('static', filename='css/custom.css') }}" rel="stylesheet">
    <style>
        /* ── Sidebar: leather-toned, matching frontend ── */
        .admin-sidebar {
            position: fixed; top: 0; left: 0; bottom: 0; width: 200px;
            background: var(--ink);
            padding: 1.5rem 0; z-index: 1000; overflow-y: auto;
        }
        .admin-sidebar .brand {
            font-family: 'Playfair Display', Georgia, serif;
            font-size: 1.1rem; font-weight: 700; letter-spacing: 0.04em;
            color: var(--cream); padding: 0 1.25rem 1.25rem;
            border-bottom: 1px solid var(--ink-light); margin-bottom: 0.75rem;
        }
        .admin-sidebar .nav-section {
            font-size: 0.65rem; text-transform: uppercase; letter-spacing: 0.1em;
            color: var(--ink-light); padding: 1rem 1.25rem 0.35rem;
        }
        .admin-sidebar .nav-link {
            color: rgba(247,243,237,0.6); padding: 0.5rem 1.25rem;
            font-size: 0.85rem; font-weight: 450;
            border-left: 3px solid transparent;
            transition: color var(--transition), background var(--transition), border-color var(--transition);
        }
        .admin-sidebar .nav-link:hover {
            color: var(--cream); background: rgba(247,243,237,0.05);
            border-left-color: var(--tan);
        }
        .admin-sidebar .nav-link.active {
            color: var(--cream); background: rgba(247,243,237,0.08);
            border-left-color: var(--warm-accent); font-weight: 600;
        }

        /* ── Main area ── */
        .admin-main {
            margin-left: 200px; padding: 1.75rem 2.25rem; min-height: 100vh;
        }
        .admin-main .page-title {
            font-family: 'Playfair Display', Georgia, serif;
            font-size: 1.35rem; font-weight: 700; color: var(--ink);
            margin-bottom: 1.5rem; letter-spacing: 0.02em;
        }
        .admin-main .page-title::after {
            content: ''; display: block; width: 32px; height: 3px;
            background: var(--warm-accent); margin-top: 0.3rem; border-radius: 2px;
        }

        /* ── Stat cards ── */
        .admin-stats {
            display: grid; grid-template-columns: repeat(4, 1fr); gap: 1rem;
            margin-bottom: 1.5rem;
        }
        .admin-stat {
            background: var(--paper); border-radius: var(--radius);
            padding: 1.2rem 1.25rem; box-shadow: var(--shadow-sm);
            border: 1px solid var(--border-warm);
            transition: transform var(--transition), box-shadow var(--transition);
        }
        .admin-stat:hover {
            transform: translateY(-2px); box-shadow: var(--shadow-md);
        }
        .admin-stat .stat-label {
            font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.08em;
            color: var(--ink-light); margin-bottom: 0.25rem;
        }
        .admin-stat .stat-value {
            font-family: 'Playfair Display', Georgia, serif;
            font-size: 2rem; font-weight: 700; color: var(--ink); line-height: 1;
        }

        /* ── Data card (table wrapper) ── */
        .data-card {
            background: var(--paper); border-radius: var(--radius);
            box-shadow: var(--shadow-sm); border: 1px solid var(--border-warm);
            overflow: hidden;
        }
        .data-card .card-header {
            background: var(--cream); border-bottom: 1px solid var(--border-warm);
            font-size: 0.8rem; font-weight: 600; text-transform: uppercase;
            letter-spacing: 0.06em; color: var(--ink-light);
            padding: 0.75rem 1.25rem;
        }
        .admin-table { width: 100%; margin: 0; }
        .admin-table thead th {
            background: var(--cream); border-bottom: 2px solid var(--border-warm);
            font-size: 0.72rem; font-weight: 600; text-transform: uppercase;
            letter-spacing: 0.06em; color: var(--ink-light);
            padding: 0.65rem 1.25rem; white-space: nowrap;
        }
        .admin-table tbody td {
            padding: 0.7rem 1.25rem; vertical-align: middle;
            border-bottom: 1px solid var(--border-light);
            font-size: 0.85rem; color: var(--ink);
        }
        .admin-table tbody tr:last-child td { border-bottom: none; }
        .admin-table tbody tr:hover { background: var(--cream); }
        .td-date { font-size: 0.8rem; color: var(--ink-light); }
        .td-count { text-align: center; font-weight: 500; }
        .table-thumb {
            width: 32px; height: 44px; object-fit: cover;
            border-radius: var(--radius-sm); box-shadow: 0 1px 2px rgba(0,0,0,0.1);
        }

        /* ── Badges ── */
        .badge-reading { background: #E8F0FE; color: var(--info-blue); font-weight: 500; font-size:0.75rem; }
        .badge-done { background: #E6F4EA; color: var(--success-green); font-weight: 500; font-size:0.75rem; }

        /* ── Buttons ── */
        .btn-primary-custom {
            background: var(--leather); color: #fff; border: none;
            border-radius: var(--radius-sm); font-size: 0.82rem; font-weight: 500;
            padding: 0.4rem 1rem; transition: opacity var(--transition);
        }
        .btn-primary-custom:hover { opacity: 0.9; color: #fff; }
        .btn-outline-custom {
            background: transparent; color: var(--ink-light);
            border: 1px solid var(--border-warm); border-radius: var(--radius-sm);
            font-size: 0.78rem; padding: 0.35rem 0.8rem;
            transition: all var(--transition); text-decoration: none !important;
        }
        .btn-outline-custom:hover { border-color: var(--leather); color: var(--leather); background: var(--cream); }
        .btn-outline-danger-custom {
            background: transparent; color: var(--warm-accent); border: 1px solid transparent;
            border-radius: var(--radius-sm); font-size: 0.78rem; padding: 0.35rem 0.8rem;
            transition: all var(--transition);
        }
        .btn-outline-danger-custom:hover { border-color: var(--warm-accent); background: rgba(192,57,43,0.04); }

        /* ── Input ── */
        .input-custom {
            border: 1px solid var(--border-warm); border-radius: var(--radius);
            font-size: 0.85rem; padding: 0.4rem 0.75rem;
            background: var(--cream); color: var(--ink);
            transition: border-color var(--transition);
        }
        .input-custom:focus { border-color: var(--tan); outline: none; box-shadow: 0 0 0 3px rgba(212,165,116,0.15); }

        /* ── Pagination ── */
        .pagination .page-link {
            border-color: var(--border-warm); color: var(--ink-light); font-size:0.85rem;
        }
        .pagination .page-item.active .page-link {
            background: var(--leather); border-color: var(--leather); color: #fff;
        }

        /* ── Mobile ── */
        @media (max-width: 768px) {
            .admin-sidebar { width: 100%; position: relative; height: auto; padding:0.75rem; }
            .admin-main { margin-left: 0; padding: 1rem; }
            .admin-stats { grid-template-columns: repeat(2,1fr); }
            .admin-stat .stat-value { font-size: 1.5rem; }
        }
        @media (prefers-reduced-motion: reduce) {
            .admin-stat { transition: none; }
        }
    </style>
</head>
<body style="background:var(--cream);">
<div class="admin-sidebar">
    <div class="brand">个人藏书</div>
    <div class="nav-section">管理</div>
    <a class="nav-link {{ 'active' if request.endpoint == 'admin.dashboard' }}" href="{{ url_for('admin.dashboard') }}">概览</a>
    <a class="nav-link {{ 'active' if request.endpoint and request.endpoint.startswith('admin.book') }}" href="{{ url_for('admin.books') }}">图书管理</a>
    <a class="nav-link {{ 'active' if request.endpoint == 'admin.categories' }}" href="{{ url_for('admin.categories') }}">分类管理</a>
    <a class="nav-link {{ 'active' if request.endpoint and request.endpoint.startswith('admin.note') }}" href="{{ url_for('admin.notes') }}">读后感</a>
    <div class="nav-section">导航</div>
    <a class="nav-link" href="{{ url_for('main.index') }}" target="_blank">前往前台</a>
    <a class="nav-link" href="{{ url_for('admin.logout') }}">退出登录</a>
</div>
<div class="admin-main">
    {% with messages = get_flashed_messages(with_categories=true) %}
        {% for category, msg in messages %}
        <div class="alert alert-{{ category }} alert-dismissible fade show" role="alert">{{ msg }}<button type="button" class="btn-close" data-bs-dismiss="alert"></button></div>
        {% endfor %}
    {% endwith %}
    {% block content %}{% endblock %}
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
