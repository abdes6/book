<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<style>
@page {
    margin: 2.5cm 2cm;
    @bottom-right {
        content: counter(page);
        font-size: 10pt;
        color: #999;
    }
}
body {
    font-family: "Inter", "Microsoft YaHei", sans-serif;
    font-size: 12pt;
    line-height: 1.8;
    color: #2C3E50;
}
h1 {
    font-size: 22pt;
    font-family: "Playfair Display", "Times New Roman", serif;
    margin-bottom: 0.3em;
}
.meta {
    color: #888;
    font-size: 10pt;
    margin-bottom: 2em;
    padding-bottom: 1em;
    border-bottom: 1px solid #ddd;
}
.content {
    text-align: justify;
}
.content img {
    max-width: 100%;
    height: auto;
    margin: 1em 0;
}
.content h2 { font-size: 16pt; margin-top: 1.5em; }
.content h3 { font-size: 14pt; margin-top: 1.2em; }
.content p { margin: 0.6em 0; }
.content code {
    background: #f5f5f5;
    padding: 0.2em 0.4em;
    border-radius: 3px;
    font-size: 11pt;
}
.content pre {
    background: #f5f5f5;
    padding: 1em;
    border-radius: 4px;
    overflow-x: auto;
    font-size: 10pt;
}
.content blockquote {
    border-left: 3px solid #C0392B;
    padding-left: 1em;
    margin: 1em 0;
    color: #555;
    font-style: italic;
}
.content table { border-collapse: collapse; width: 100%; margin: 1em 0; }
.content th, .content td {
    border: 1px solid #ddd;
    padding: 0.5em;
    text-align: left;
}
.content th { background: #f5f5f5; }
</style>
</head>
<body>
<h1>{{ note.title }}</h1>
<div class="meta">
    所属书籍：{{ note.book.title }} &middot; 更新于 {{ note.updated_at.strftime('%Y-%m-%d %H:%M') if note.updated_at else '' }}
</div>
<div class="content">
    {{ note.content|markdown|safe }}
</div>
</body>
</html>
