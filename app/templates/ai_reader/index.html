{% extends 'base.html' %}
{% block title %}AI 读书助手{% endblock %}
{% block content %}
<div class="row" style="height:calc(100vh - 120px);">
  <div class="col-3 border-end" style="background:var(--cream);">
    <h5 class="my-3">📚 选择书籍</h5>
    <input type="text" id="book-search" class="form-control mb-3" placeholder="搜索书名/作者...">
    <div id="book-list" class="list-group" style="max-height:calc(100vh - 220px);overflow-y:auto;"></div>
  </div>
  <div class="col-9 d-flex flex-column">
    <div id="placeholder" class="welcome-msg flex-grow-1 d-flex flex-column align-items-center justify-content-center">
      <div class="rounded-circle welcome-avatar d-inline-flex align-items-center justify-content-center" style="color:#fff;background:linear-gradient(135deg,var(--warm-accent),var(--leather));font-size:2rem;">🤖</div>
      <h5>AI 读书助手</h5>
      <div class="welcome-divider"></div>
      <p class="welcome-quote">从左侧选择一本书，开始智能对话、摘要、分析与推荐</p>
      <p class="welcome-hint">搜索书名快速定位，点击即可开始</p>
    </div>
    <div id="ai-panel" class="d-none flex-grow-1 d-flex flex-column">
      <ul class="nav nav-tabs" id="aiTabs">
        <li class="nav-item"><button class="nav-link active" data-tab="chat">对话</button></li>
        <li class="nav-item"><button class="nav-link" data-tab="summary">摘要</button></li>
        <li class="nav-item"><button class="nav-link" data-tab="review">书评</button></li>
        <li class="nav-item"><button class="nav-link" data-tab="analysis">分析</button></li>
        <li class="nav-item"><button class="nav-link" data-tab="recommend">推荐</button></li>
      </ul>
      <div class="tab-content flex-grow-1 d-flex flex-column overflow-auto pt-3 px-3 pb-0" id="aiTabContent">
        <div class="tab-pane active d-flex flex-column flex-grow-1" id="tab-chat">
          <div id="chat-messages" class="flex-grow-1 mb-3 px-3" style="max-height:calc(100vh - 385px);overflow-y:auto;"></div>
          <div id="chat-options" class="options-container d-flex gap-2 flex-wrap mb-2"></div>
          <div id="chat-loading" class="typing-indicator d-none align-items-center gap-2 px-3 py-2">
            <span class="typing-dot"></span><span class="typing-dot"></span><span class="typing-dot"></span>
            <span style="color:var(--leather);font-size:0.85rem;">AI 正在思考</span>
          </div>
          <div class="chat-input-group input-group px-1 pb-1">
            <input type="text" id="chat-input" class="form-control" placeholder="输入你的问题...">
            <button class="btn btn-send" id="chat-send">发送</button>
          </div>
        </div>
        <div class="tab-pane d-none" id="tab-summary"><div class="card ai-content-card"><div class="card-body ai-content"></div></div></div>
        <div class="tab-pane d-none" id="tab-review"><div class="card ai-content-card"><div class="card-body ai-content"></div></div></div>
        <div class="tab-pane d-none" id="tab-analysis"><div class="card ai-content-card"><div class="card-body ai-content"></div></div></div>
        <div class="tab-pane d-none" id="tab-recommend"><div class="card ai-content-card"><div class="card-body ai-content"></div></div></div>
      </div>
    </div>
  </div>
</div>
<style>
.options-container { min-height:36px; padding-left:2px; }
.option-pill { border-radius:20px; background:var(--cream); border:1px solid var(--border-warm); color:var(--leather); font-size:0.85rem; padding:4px 16px; cursor:pointer; transition:all .2s; }
.option-pill:hover { background:var(--warm-accent); color:#fff; border-color:var(--warm-accent); }
.chat-input-group { border-top:1px solid var(--border-warm); background:#fff; border-radius:0 0 12px 12px; }
.chat-input-group .form-control { border:none; box-shadow:none; border-radius:24px !important; background:var(--cream); margin:8px 0; }
.chat-input-group .btn-send { border-radius:24px; background:linear-gradient(135deg,var(--warm-accent),var(--leather)); color:#fff; border:none; padding:6px 20px; margin:8px 4px; font-weight:500; transition:all .2s; }
.chat-input-group .btn-send:hover { transform:scale(1.04); box-shadow:0 2px 8px rgba(192,57,43,.3); }
.chat-bubble-user { max-width:55%; width:fit-content; margin:0 0 10px auto; padding:10px 16px; border-radius:18px 18px 18px 4px; background:var(--cream); color:var(--leather); white-space:pre-wrap; word-break:break-word; box-shadow:0 1px 4px rgba(0,0,0,.06); animation:msg-animate .25s ease; }
.chat-bubble-thinker { max-width:55%; width:fit-content; margin:0 auto 10px 0; padding:10px 16px; border-radius:18px 18px 18px 4px; background:var(--cream); color:var(--leather); white-space:pre-wrap; word-break:break-word; box-shadow:0 1px 4px rgba(0,0,0,.06); animation:msg-animate .25s ease; }
.bubble-author { font-size:0.75rem; font-weight:600; margin-bottom:2px; }
.ai-content-card { border:1px solid var(--border-warm); border-radius:12px; background:#fff; box-shadow:var(--shadow-sm); }
.ai-content-card .card-body { white-space:pre-wrap; color:var(--leather); line-height:1.7; font-size:0.95rem; }
.welcome-msg { padding:2rem; }
.welcome-avatar { width:72px; height:72px; margin-bottom:1rem; box-shadow:0 4px 16px rgba(192,57,43,.25); }
.welcome-divider { width:48px; height:3px; background:linear-gradient(90deg,var(--warm-accent),var(--leather)); border-radius:2px; margin:0.5rem 0 1rem; }
.welcome-quote { font-size:1rem; color:var(--leather); max-width:360px; text-align:center; }
.welcome-hint { font-size:0.85rem; color:var(--border-warm); }
@keyframes msg-animate { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
.typing-indicator { border-radius:18px 18px 18px 4px; background:var(--cream); }
.typing-dot { width:8px; height:8px; border-radius:50%; background:var(--warm-accent); display:inline-block; animation:typing-bounce 1.4s infinite both; }
.typing-dot:nth-child(2) { animation-delay:0.2s; }
.typing-dot:nth-child(3) { animation-delay:0.4s; }
@keyframes typing-bounce { 0%,60%,100%{opacity:.3;transform:translateY(0)} 30%{opacity:1;transform:translateY(-6px)} }
</style>
{% endblock %}
{% block scripts %}
<script>
(function(){
  var currentBookId = null;

  fetch('{{ url_for("ai_reader.book_list") }}').then(function(r){ return r.json(); }).then(function(books){
    var el = document.getElementById('book-list');
    books.forEach(function(b, index){
      var a = document.createElement('a');
      a.className = 'list-group-item list-group-item-action';
      a.href = '#';
      a.dataset.id = b.id;
      a.innerHTML = '<strong>' + escapeHtml(b.title) + '</strong><br><small>' + escapeHtml(b.author) + '</small>';
      if(index >= 10) a.style.display = 'none';
      a.addEventListener('click', function(e){
        e.preventDefault();
        selectBook(b.id, b.title);
        document.querySelectorAll('#book-list .active').forEach(function(x){ x.classList.remove('active'); });
        a.classList.add('active');
      });
      el.appendChild(a);
    });
  });

  document.getElementById('book-search').addEventListener('input', function(){
    var q = this.value.toLowerCase();
    document.querySelectorAll('#book-list .list-group-item').forEach(function(item){
      item.style.display = item.textContent.toLowerCase().includes(q) ? '' : 'none';
    });
  });

  document.querySelectorAll('#aiTabs .nav-link').forEach(function(tab){
    tab.addEventListener('click', function(){
      document.querySelectorAll('#aiTabs .nav-link').forEach(function(t){ t.classList.remove('active'); });
      tab.classList.add('active');
      document.querySelectorAll('.tab-pane').forEach(function(p){ p.classList.add('d-none'); });
      var target = document.getElementById('tab-' + tab.dataset.tab);
      target.classList.remove('d-none');
      if(currentBookId && tab.dataset.tab !== 'chat') loadTabContent(tab.dataset.tab, currentBookId, target);
    });
  });

  document.getElementById('chat-send').addEventListener('click', sendChat);
  document.getElementById('chat-input').addEventListener('keydown', function(e){
    if(e.key === 'Enter') sendChat();
  });

  function selectBook(id, title){
    currentBookId = id;
    document.getElementById('placeholder').classList.add('d-none');
    var panel = document.getElementById('ai-panel');
    panel.classList.remove('d-none');
    document.getElementById('chat-messages').innerHTML = '';
    document.getElementById('chat-input').value = '';
    document.getElementById('chat-loading').classList.add('d-none');
    document.querySelectorAll('.tab-pane .ai-content').forEach(function(el){ el.innerHTML = ''; el.dataset.loaded = ''; });
    document.getElementById('tab-chat').classList.remove('d-none');
    document.querySelectorAll('.tab-pane').forEach(function(p){
      if(p.id !== 'tab-chat') p.classList.add('d-none');
    });
    document.querySelectorAll('#aiTabs .nav-link').forEach(function(t){
      t.classList.toggle('active', t.dataset.tab === 'chat');
    });
    fetch('/ai-reader/' + id + '/chat').then(function(r){ return r.json(); }).then(function(data){
      if(data.messages){
        var el = document.getElementById('chat-messages');
        data.messages.forEach(function(m){
          addChatBubble(m.role, m.content);
        });
        if(data.options) addOptions(data.options);
      }
    });
  }

  function loadTabContent(tab, bookId, targetEl){
    var contentEl = targetEl.querySelector('.ai-content');
    if(!contentEl || contentEl.dataset.loaded) return;
    contentEl.innerHTML = '<div class="text-center py-5"><div class="spinner-border" style="color:var(--leather);"></div><p class="mt-2 text-muted">正在生成...</p></div>';
    fetch('/ai-reader/' + bookId + '/' + tab).then(function(r){ return r.json(); }).then(function(data){
      contentEl.dataset.loaded = '1';
      if(data.error){
        contentEl.innerHTML = '<div class="alert alert-warning">' + escapeHtml(data.error) + '</div>';
      } else {
        var html = data.content ? escapeHtml(data.content) : '';
        if(data.recommendations){
          html = data.recommendations.map(function(r, i){
            return '<div class="mb-2 pb-2' + (i < data.recommendations.length - 1 ? ' border-bottom' : '') + '">' + escapeHtml(r) + '</div>';
          }).join('');
        }
        html += '<div class="mt-3"><button class="btn btn-sm btn-outline-secondary" onclick="regenerate(this,\'' + tab + '\',' + bookId + ')">重新生成</button></div>';
        contentEl.innerHTML = html;
      }
    }).catch(function(){
      contentEl.innerHTML = '<div class="alert alert-danger">加载失败</div>';
    });
  }

  window.regenerate = function(btn, tab, bookId){
    var target = btn.closest('.tab-pane');
    var contentEl = target.querySelector('.ai-content');
    if(contentEl) contentEl.dataset.loaded = '';
    loadTabContent(tab, bookId, target);
  };

  function sendChat(){
    if(!currentBookId) return;
    var input = document.getElementById('chat-input');
    var msg = input.value.trim();
    if(!msg) return;
    input.value = '';
    addChatBubble('user', msg);
    document.getElementById('chat-options').innerHTML = '';
    document.getElementById('chat-loading').classList.remove('d-none');
    fetch('/ai-reader/' + currentBookId + '/chat', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({message: msg})
    }).then(function(r){ return r.json(); }).then(function(data){
      document.getElementById('chat-loading').classList.add('d-none');
      if(data.error){
        addChatBubble('assistant', '⚠️ ' + data.error);
      } else {
        addChatBubble('assistant', data.reply);
        if(data.options) addOptions(data.options);
      }
    }).catch(function(){
      document.getElementById('chat-loading').classList.add('d-none');
      addChatBubble('assistant', '⚠️ 网络错误，请重试');
    });
  }

  function addChatBubble(role, text){
    var el = document.getElementById('chat-messages');
    var div = document.createElement('div');
    div.className = role === 'user' ? 'chat-bubble-user' : 'chat-bubble-thinker';
    if(role !== 'user'){
      var author = document.createElement('div');
      author.className = 'bubble-author';
      author.textContent = 'AI 读书助手';
      div.appendChild(author);
    }
    var content = document.createElement('div');
    content.textContent = text;
    div.appendChild(content);
    el.appendChild(div);
    el.scrollTop = el.scrollHeight;
  }

  function addOptions(options){
    var el = document.getElementById('chat-options');
    el.innerHTML = '';
    options.forEach(function(opt){
      var btn = document.createElement('button');
      btn.className = 'option-pill';
      btn.textContent = opt;
      btn.addEventListener('click', function(){
        document.getElementById('chat-input').value = opt;
        sendChat();
      });
      el.appendChild(btn);
    });
  }

  function escapeHtml(text){
    var d = document.createElement('div');
    d.appendChild(document.createTextNode(text));
    return d.innerHTML;
  }
})();
</script>
{% endblock %}
