<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}个人藏书{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="{{ url_for('static', filename='css/custom.css') }}" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-custom">
    <div class="container">
        <a class="navbar-brand" href="{{ url_for('main.index') }}">个人藏书</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#nb">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="nb">
            <ul class="navbar-nav me-auto">
                <li class="nav-item"><a class="nav-link" href="{{ url_for('main.book_list') }}">全部藏书</a></li>
                <li class="nav-item"><a class="nav-link" href="{{ url_for('main.stats') }}">阅读统计</a></li>
            </ul>
            <ul class="navbar-nav">
                {% if current_user.is_authenticated and current_user.__class__.__name__ == 'User' %}
                <li class="nav-item"><span class="nav-link text-light">{{ current_user.username }}</span></li>
                <li class="nav-item"><a class="nav-link" href="{{ url_for('auth.logout') }}">退出</a></li>
                {% endif %}
            </ul>
            <form class="d-flex" action="{{ url_for('main.book_list') }}" method="GET">
                <input class="form-control me-2" name="q" placeholder="搜书名/作者...">
                <button class="btn btn-outline-light" type="submit">搜索</button>
            </form>
        </div>
    </div>
</nav>
<div class="container mt-4">{% block content %}{% endblock %}</div>
<footer class="text-center py-4 mt-5 border-top"><small>个人藏书管理系统 &copy; 2026</small></footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
{% block scripts %}{% endblock %}
</body>
</html>
