<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="csrf-token" content="{{ csrf_token() }}">
    <title>{% block title %}个人藏书{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="{{ url_for('static', filename='css/custom.css') }}" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-custom">
    <div class="container">
        <a class="navbar-brand{% if request.endpoint == 'main.index' %} active{% endif %}" href="{{ url_for('main.index') }}">个人藏书</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#nb">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="nb">
            <ul class="navbar-nav me-auto">
                <li class="nav-item"><a class="nav-link{% if request.endpoint and request.endpoint.startswith('main.book_') %} active{% endif %}" href="{{ url_for('main.book_list') }}">全部藏书</a></li>
                <li class="nav-item"><a class="nav-link{% if request.endpoint == 'main.highlight_search' %} active{% endif %}" href="{{ url_for('main.highlight_search') }}" title="搜索划线笔记">划线搜索</a></li>
                <li class="nav-item"><a class="nav-link{% if request.endpoint and request.endpoint.startswith('ai_reader.') %} active{% endif %}" href="{{ url_for('ai_reader.index') }}">AI 读书</a></li>
                <li class="nav-item"><a class="nav-link{% if request.endpoint and request.endpoint.startswith('thinker.') %} active{% endif %}" href="{{ url_for('thinker.list_thinkers') }}">思想家</a></li>
                <li class="nav-item"><a class="nav-link{% if request.endpoint == 'main.stats' %} active{% endif %}" href="{{ url_for('main.stats') }}">阅读统计</a></li>
            </ul>
            <ul class="navbar-nav align-items-center">
                <li class="nav-item me-2">
                    <button id="theme-toggle" class="btn btn-sm btn-outline-light border-0" title="切换主题" style="font-size:1.1rem;">🌓</button>
                </li>
                {% if current_user.is_authenticated %}
                <li class="nav-item dropdown">
                    <a class="nav-link dropdown-toggle user-menu-toggle" href="#" role="button" data-bs-toggle="dropdown">
                        {{ current_user.username }}
                    </a>
                    <ul class="dropdown-menu dropdown-menu-end user-dropdown">
                        <li><a class="dropdown-item" href="{{ url_for('admin.dashboard') }}">
                            <span class="drop-icon">⚙</span>管理后台
                        </a></li>
                        <li><hr class="dropdown-divider"></li>
                        <li><a class="dropdown-item" href="{{ url_for('auth.logout') }}">
                            <span class="drop-icon">↩</span>退出登录
                        </a></li>
                    </ul>
                </li>
                {% endif %}
            </ul>
            <form class="d-flex" action="{{ url_for('main.book_list') }}" method="GET">
                <input class="form-control me-2" name="q" placeholder="搜书名/作者...">
                <button class="btn btn-outline-light" type="submit">搜索</button>
            </form>
        </div>
    </div>
</nav>
<div class="container mt-4">{% block content %}{% endblock %}</div>
<footer class="text-center py-4 mt-5 border-top"><small>个人藏书管理系统 &copy; 2026</small></footer>
<script>
(function() {
    var html = document.documentElement;
    var toggle = document.getElementById('theme-toggle');
    var stored = localStorage.getItem('theme');
    function apply(theme) {
        html.setAttribute('data-bs-theme', theme);
        if (toggle) toggle.textContent = theme === 'dark' ? '☀️' : '🌓';
    }
    if (stored) {
        apply(stored);
    } else if (window.matchMedia('(prefers-color-scheme: dark)').matches) {
        apply('dark');
    }
    if (toggle) {
        toggle.addEventListener('click', function() {
            var next = html.getAttribute('data-bs-theme') === 'dark' ? 'light' : 'dark';
            localStorage.setItem('theme', next);
            apply(next);
        });
    }
})();
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
<script src="{{ url_for('static', filename='js/stats.js') }}"></script>
<script>
(function() {
    var token = document.querySelector('meta[name="csrf-token"]');
    var csrfToken = token ? token.getAttribute('content') : '';
    var originalFetch = window.fetch;
    window.fetch = function(url, options) {
        options = options || {};
        if (typeof url === 'string' && url.startsWith('/')) {
            options.headers = options.headers || {};
            if (!(options.headers instanceof Headers)) {
                options.headers = new Headers(options.headers);
            }
            if (!options.headers.has('X-CSRFToken')) {
                options.headers.set('X-CSRFToken', csrfToken);
            }
        }
        return originalFetch.call(window, url, options);
    };
})();
</script>
{% block scripts %}{% endblock %}
</body>
</html>
